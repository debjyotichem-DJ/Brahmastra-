version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: dchemistry-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dchemistry
      POSTGRES_PASSWORD: dchemistry_password
      POSTGRES_DB: dchemistry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dchemistry"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for rate limiting, caching)
  redis:
    image: redis:7-alpine
    container_name: dchemistry-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dchemistry-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://dchemistry:dchemistry_password@postgres:5432/dchemistry?schema=public
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
