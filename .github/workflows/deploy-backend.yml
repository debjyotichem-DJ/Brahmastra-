name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/backend/**'
      - 'packages/shared/**'
      - 'pnpm-workspace.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./packages/backend/Dockerfile
        push: true
        tags: dchemistry/backend:latest,dchemistry/backend:${{ github.sha }}
        
    - name: Deploy to Production
      # Replace with your actual deployment script/webhook (e.g., triggering a Render deploy, or SSHing into an EC2 instance)
      run: |
        echo "Docker image pushed successfully. Ready to pull on production server."
        # curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }}
